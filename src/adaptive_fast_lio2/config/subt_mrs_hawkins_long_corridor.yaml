adaptive_fastlio_mapping:
  ros__parameters:
    common:
      lid_topic: "/velodyne_points"
      imu_topic: "/imu/data"
      time_sync_en: false
      time_offset_lidar_to_imu: 0.0

    preprocess:
      lidar_type: 2
      scan_line: 16
      # velodyne_pointcloud publishes per-point time in seconds.
      timestamp_unit: 0
      scan_rate: 10
      blind: 0.5

    # Keep all VLP-16 points; the cloud is already sparse.
    point_filter_num: 1
    feature_extract_enable: false

    publish:
      scan_publish_en: true
      dense_publish_en: true
      scan_bodyframe_pub_en: true
      map_en: true

    mapping:
      gyr_cov: 0.1
      acc_cov: 0.1
      b_gyr_cov: 0.0001
      b_acc_cov: 0.0001
      imu_init_num: 400
      filter_size_surf: 0.5
      filter_size_map: 0.5

      # SubT_MRS_Hawkins_Long_Corridor_RC_Extrinsics.yaml laser_to_imu:
      # p_imu = R_laser_to_imu * p_lidar + t_laser_to_imu.
      extrinsic_T: [0.08, 0.029, 0.03]
      extrinsic_R: [0.999212900, -0.000519121, 0.004000000,
                    0.000516111, 0.999218492, -0.000939132,
                   -0.004000000, 0.000802565, 0.999993652]
      extrinsic_est_en: false

      nearest_search_num: 5
      nearest_sq_dist_threshold: 5.0
      plane_residual_threshold: 0.1
      effective_score_threshold: 0.9
      scan_match_max_iteration: 3
      scan_match_min_effective_points: 20
      laser_point_cov: 0.001
      map_init_min_points: 6
      cube_len: 1000.0
      det_range: 100.0
      move_threshold: 1.5
      local_map_enable: true
      local_map_delete_enable: true

    adaptive_map:
      enable: true
      min_effective_points: 120
      min_range: 0.5
      max_range: 80.0
      residual_scale: 2.0
      residual_robust_sigma: 2.5
      min_quality_score: 0.92
      min_effective_ratio: 0.08
      max_mean_residual: 0.15
      min_normal_eigen_ratio: 0.02
      normal_bin_angle_deg: 15.0
      max_points_per_normal_bin: 30
      max_novel_points_per_frame: 50

    runtime_log:
      summary_interval_frames: 10
      sensor_debug: true
      csv_enable: true
      csv_append: false
      csv_path: "/home/romi/Adaptive_FAST_LIO2/experiments/subt_mrs_hawkins_long_corridor/results/adaptive_runtime.csv"
