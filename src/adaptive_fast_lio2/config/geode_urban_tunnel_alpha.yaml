adaptive_fastlio_mapping:
  ros__parameters:
    common:
      # GEODE Urban Tunnel 设备 alpha：VLP-16 点云与 Xsens MTi-30 IMU。
      lid_topic: "/velodyne_points"
      imu_topic: "/imu/data"
      time_sync_en: false
      time_offset_lidar_to_imu: 0.0

    preprocess:
      lidar_type: 2
      scan_line: 16
      # Urban_Tunnel01 的 PointCloud2.time 为秒，范围约为 [-0.1, 0]。
      timestamp_unit: 0
      scan_rate: 10
      blind: 0.5

    # GEODE 点云按每个方位角连续存放 16 条 ring；设为 1 可保留完整 VLP-16 点云。
    point_filter_num: 1
    feature_extract_enable: false

    publish:
      scan_publish_en: true
      dense_publish_en: true
      scan_bodyframe_pub_en: true
      map_en: true

    mapping:
      gyr_cov: 0.1
      acc_cov: 0.1
      b_gyr_cov: 0.0001
      b_acc_cov: 0.0001
      # Xsens 为 100 Hz；约 1 秒窗口可降低车辆启动加速度对重力初始化的污染。
      imu_init_num: 100
      filter_size_surf: 0.5
      filter_size_map: 0.5

      # GEODE 官方 alpha_config.yaml 中的 T_IMU_LiDAR：
      # p_imu = R_IMU_LiDAR * p_lidar + t_IMU_LiDAR。
      extrinsic_T: [0.0961, -0.1338, 0.3032]
      extrinsic_R: [0.9999, 0.0049, 0.0153,
                    -0.0050, 1.0000, 0.0021,
                    -0.0153, -0.0022, 0.9999]
      extrinsic_est_en: false

      nearest_search_num: 5
      nearest_sq_dist_threshold: 5.0
      plane_residual_threshold: 0.1
      effective_score_threshold: 0.9
      scan_match_max_iteration: 3
      scan_match_min_effective_points: 20
      laser_point_cov: 0.001
      map_init_min_points: 6
      cube_len: 1000.0
      det_range: 100.0
      move_threshold: 1.5
      local_map_enable: true
      local_map_delete_enable: true

    adaptive_map:
      # 首次运行先关闭策略，确认输入时间、外参与基础里程计工作正常。
      enable: true
      min_effective_points: 200
      # 与 preprocess.blind 对齐，避免 Adaptive 额外删除 0.5 至 2.0 m 的近距离约束。
      min_range: 0.5
      max_range: 100.0
      residual_scale: 2.0
      residual_robust_sigma: 2.5
      min_quality_score: 0.92
      min_effective_ratio: 0.1
      max_mean_residual: 0.15
      min_normal_eigen_ratio: 0.02
      normal_bin_angle_deg: 15.0
      max_points_per_normal_bin: 30
      max_novel_points_per_frame: 50

    runtime_log:
      summary_interval_frames: 10
      sensor_debug: true
      csv_enable: false
      csv_append: false
      csv_path: "/home/romi/Adaptive_FAST_LIO2/experiments/geode_urban_tunnel01/results/adaptive_runtime.csv"
